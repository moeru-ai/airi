allow-visible-on-all-workspaces:
  title: すべてのワークスペースで表示
  description: ウィンドウをすべてのワークスペースで表示可能にします。macOSのみ。
spotlight:
  errors:
    unknown: 不明なエラー
    prefix: '問題が発生しました: {message}'
    shortcutRegistrationFailed: '問題が発生しました: Spotlight ショートカットを登録できませんでした。'
pages:
  modules:
    mcp-server:
      description: MCPサーバーとツールの接続と管理
      title: MCPサーバー
  screen-awareness:
    title: Screen awareness
    description: Let AIRI periodically observe a selected display and respond through the existing character pipeline.
    enable:
      label: Enable scheduled screen awareness
      description: Disabled by default. When enabled, AIRI observes the selected display at the configured interval.
      enabled: Enabled
      disabled: Disabled
    privacy:
      title: Privacy first
      description: Screenshots stay in memory and are never written to disk. When sensitive content may be visible, AIRI is instructed to give only a general privacy reminder.
    permission:
      description: Screen Recording permission is required before AIRI can list or observe displays.
    capture:
      title: Display capture
      description: Only full displays are listed. Application windows are not available to this feature.
      display-label: Display
      display-placeholder: Select a display
      refresh: Refresh displays
      no-displays: No displays are currently available.
      load-error: Failed to load available displays
    interval:
      label: Observation interval
      description: Scheduled observations wait or skip when a conversation, model request, character response, or speech is active.
      seconds: '{count} seconds'
      minutes: '{count} minutes'
    observe-now:
      label: Observe now
      description: Run one observation immediately. This manual action is available even when scheduled awareness is disabled.
    status:
      title: Activity
      current: 'Status: {status}'
      last-observed: 'Last observed: {time}'
      never: Never
      idle: Ready
      waiting: Waiting for the current interaction to finish
      observing: Observing the selected display
      responding: Preparing the character response
      error: Needs attention
      error-label: The last observation could not be completed
    recent-response:
      title: Latest character response
      empty: No screen-awareness response yet.
      expand: Show response
      collapse: Hide response
    caption:
      close: Close screen-awareness response
  system:
    sections:
      section:
        window-shortcuts:
          title: キーボードショートカット
    window-shortcuts:
      description: ウィンドウ用ショートカットを変更します。
      title: ウィンドウショートカット
      empty: 未設定
      spotlight:
        title: Spotlight ショートカット
        description: ショートカットをクリックしてから新しいショートカットを押します。Esc でキャンセルします。
      actions:
        recording: キーを押してください
        reset: リセット
      errors:
        load: ショートカットを読み込めませんでした
        conflict: このショートカットは使用中です。
        failed: ショートカットの更新に失敗しました
        requiresModifier: Cmd、Ctrl、Alt、Super のいずれかを少なくとも 1 つ使用してください。
      toggle-move:
        label: 移動の切り替え
      toggle-resize:
        label: サイズ変更の切り替え
      toggle-ignore-mouse-event:
        label: マウスイベント無視の切り替え
      press-keys: 何かキーを押してください…
    developer:
      sections:
        section:
          use-window-mouse:
            title: ウィンドウマウス ツールを使用
            description: Electronウィンドウのカーソル位置をテストします
devtools:
  title: 開発者
  pages:
    context-flow:
      title: コンテキストのフロー
    lag-visualizer:
      title: ラグビジュアライザー
    performance-visualizer:
      title: パフォーマンスビジュアライザー
      description: FPS/ロングタスク/メモリーオーバーレイの切り替え
    markdown-stress:
      title: Markdown ストレス
      description: 大量のチャットデータを含むMarkdownの解析とレンダリング負荷のテスト
    io-tracer:
      title: IO Tracer
    widgets-calling:
      title: ウィジェット呼び出し
screen-capture:
  permissions-prompt:
    title: 画面キャプチャ
    description: 画面またはウィンドウをキャプチャするには、画面とシステムのオーディオ録音の許可が必要です。
    open-preferences: システム設定を開く
    dismiss: 閉じる
    instructions:
      step-1: '「システム設定」を開き、サイドバーから「プライバシーとセキュリティ」を選択します。'
      step-2: '「画面&システム音声録音」および「システム音声録音のみ」のセクションで、AIRI用のスイッチをオンにしてください。'
      step-2-note: AIRIが表示されていない場合は、「+」ボタンをクリックして「アプリケーション」フォルダから「AIRI」を選択して手動で追加してください。

	<script>
		// Standalone bridge bootstrap — runs before the webview-ui entry.
		// Creates a minimal bridge object on window.__roo_bridge__ so that
		// vscode.ts detects standalone mode and uses WebSocket instead of
		// localStorage. The full bridge module is loaded lazily after the
		// app mounts (see main.tsx).
		(function() {
			var WS_URL = location.protocol === "https:"
				? "wss://" + location.host + "/ws"
				: "ws://" + location.host + "/ws";
			// Use wss:// for secure contexts, ws:// for local dev only

			var ws = null;
			var state = null;
			var handlers = new Set();
			var queue = [];

			function send(msg) {
				if (ws && ws.readyState === 1) ws.send(JSON.stringify(msg));
				else queue.push(msg);
			}

			function handle(message) {
				if (message.type === "state" && message.state) {
					state = message.state;
				}
				for (var i = 0; i < handlers.length; i++) {
					var h = handlers[i];
					try { h(message); } catch(e) { console.error(e); }
				}
				// Also dispatch as window event for ExtensionStateContext
				window.dispatchEvent(new MessageEvent("message", { data: message }));
			}

			function connect() {
				ws = new WebSocket(WS_URL);
				ws.addEventListener("open", function() {
					console.log("[roo-bridge] ws connected");
					for (var i = 0; i < queue.length; i++) ws.send(JSON.stringify(queue[i]));
					queue.length = 0;
					send({ type: "webviewDidLaunch" });
				});
				ws.addEventListener("message", function(e) {
					try { handle(JSON.parse(e.data)); } catch(err) { console.warn("[roo-bridge] invalid", err); }
				});
				ws.addEventListener("close", function() { console.log("[roo-bridge] ws disconnected"); setTimeout(connect, 2000); });
				ws.addEventListener("error", function(e) { console.warn("[roo-bridge] ws error", e); });
			}

			connect();

			var api = {
				connect: connect,
				postMessage: function(msg) { send(msg); },
				getState: function() { return state; },
				setState: function(newState) { state = newState; send({ type: "state", state: newState }); },
				onMessage: function(handler) { handlers.push(handler); return function() { var idx = handlers.indexOf(handler); if (idx >= 0) handlers.splice(idx, 1); }; },
			};
			window.__roo_bridge__ = api;
		})();
	</script>

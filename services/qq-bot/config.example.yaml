#     2. 如果使用了工具，总结工具调用次数和关键发现
#     3. 用用户的语言撰写摘要

# ═══════════════════════════════════════════════════════════════
# Agent 主动发言（实验性）
# ═══════════════════════════════════════════════════════════════
# agentLoop:
#   enabled: false
#   intervalMs: 60000           # 检查间隔 (ms)
#   minUnreadToCheck: 3         # 最小未读数才触发检查
#   maxProactivePerHour: 5      # 每 session 每小时最大主动发言次数

# ═══════════════════════════════════════════════════════════════
# 全局
# ═══════════════════════════════════════════════════════════════
logging:
  level: info # debug / info / warn / error / off


name: Docs API

on:
  push:
    branches:
      - main

  pull_request:
    branches:
      - main
    paths:
      - 'packages/server-shared/**'
      - 'packages/server-runtime/**'
      - 'packages/server-sdk/**'
      - 'typedoc.base.json'
      - '.github/workflows/docs-api.yml'

  workflow_dispatch:

permissions:
  contents: write

jobs:
  generate-api-docs:
    name: Generate API Docs (TypeDoc)
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v6
        with:
          submodules: true

      - uses: pnpm/action-setup@v5
        with:
          version: 10.33.0
      - uses: actions/setup-node@v6
        with:
          node-version: lts/*
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - name: Generate TypeDoc API reference
        run: pnpm docs:generate

      - name: Verify docs/api was produced
        run: |
          if [ ! -f docs/api/index.html ]; then
            echo "::error::docs/api/index.html was not generated — TypeDoc produced no output."
            exit 1
          fi
          echo "API docs generated successfully — docs/api/index.html exists."

      - name: Upload API docs artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: api-docs
          path: docs/api/
          retention-days: 30

      - name: Commit API docs to repo
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        run: |
          git config user.name "actions-user"
          git config user.email "actions@github.com"

          git add docs/api/
          if git diff --cached --quiet; then
            echo "docs/api is up to date — no commit needed"
            exit 0
          fi

          git commit -m "chore(ci): update generated API docs"
          git push

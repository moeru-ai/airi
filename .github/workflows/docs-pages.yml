name: Docs Pages

on:
  push:
    branches:
      - main
    paths:
      - 'packages/server-shared/**'
      - 'packages/server-runtime/**'
      - 'packages/server-sdk/**'
      - 'docs/architecture/**'
      - typedoc.base.json
      - docs/scripts/gen-arch-docs.mjs
      - .github/workflows/docs-pages.yml

  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    name: Build API Docs
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          submodules: true

      - uses: pnpm/action-setup@v5
        with:
          version: 10.33.0
      - uses: actions/setup-node@v6
        with:
          node-version: lts/*
          cache: pnpm
      - uses: actions/configure-pages@v5

      - run: pnpm install --frozen-lockfile

      - name: Generate TypeDoc API reference
        run: pnpm docs:generate

      - name: Generate architecture HTML docs
        run: pnpm docs:arch

      - name: Verify docs/api was produced
        run: |
          if [ ! -f docs/api/index.html ]; then
            echo "::error::docs/api/index.html was not generated — TypeDoc produced no output."
            exit 1
          fi

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v4
        with:
          path: docs/api/

  deploy:
    name: Deploy to Pages
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4

  commit:
    name: Commit docs to repo
    needs: build
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v6
        with:
          submodules: true
          ref: main

      - uses: pnpm/action-setup@v5
        with:
          version: 10.33.0
      - uses: actions/setup-node@v6
        with:
          node-version: lts/*
          cache: pnpm

      - run: pnpm install --frozen-lockfile
      - run: pnpm docs:generate
      - run: pnpm docs:arch

      - name: Commit generated docs
        run: |
          git config user.name "actions-user"
          git config user.email "actions@github.com"
          git add docs/api/
          if git diff --cached --quiet; then
            echo "Docs up to date — no commit needed"
            exit 0
          fi
          git commit -m "chore(ci): update generated docs (api + arch)"
          git push

name: Singing Review

on:
  pull_request_target:
    branches:
      - main
    types:
      - opened
      - reopened
      - synchronize
      - ready_for_review
    paths:
      - .github/workflows/ci.yml
      - .github/workflows/singing-review.yml
      - apps/server/src/routes/singing/**
      - apps/server/src/services/singing/**
      - apps/server/test/request-body-limit.test.ts
      - apps/server/test/singing-routes.test.ts
      - apps/server/test/singing-service.test.ts
      - apps/stage-tamagotchi/src/main/services/singing/**
      - packages/i18n/locales/*/settings.json
      - packages/singing/**
      - packages/stage-ui/src/components/scenarios/singing/**
      - packages/stage-ui/src/composables/use-singing-*.test.ts
      - packages/stage-ui/src/composables/use-singing-*.ts
      - packages/stage-ui/src/stores/modules/singing/**
      - packages/stage-ui/src/types/singing.ts

  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: singing-review-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  request-approval:
    # NOTICE: This job intentionally avoids checking out pull request code.
    # `pull_request_target` runs in the base repository context and is only used
    # here to request maintainer approval from forked pull requests.
    if: ${{ github.event_name != 'pull_request_target' || !github.event.pull_request.draft }}
    name: Ask for approval to run singing review validation
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write

    steps:
      - name: Find Comment
        if: ${{ github.event_name == 'pull_request_target' }}
        uses: peter-evans/find-comment@v4
        id: fc
        with:
          issue-number: ${{ github.event.pull_request.number }}
          comment-author: 'github-actions[bot]'
          body-includes: for the singing module review workflow

      - name: Comment on require approval
        if: ${{ github.event_name == 'pull_request_target' }}
        uses: peter-evans/create-or-update-comment@v5
        with:
          comment-id: ${{ steps.fc.outputs.comment-id }}
          issue-number: ${{ github.event.pull_request.number }}
          edit-mode: replace
          body: |
            ## Approval required for the singing module review workflow.

            | Name | Link |
            |:-----|:-----|
            | Waiting for approval | For maintainers, approve [here](https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}) |

            Hey, @nekomeowww, @sumimakito, @luoling8192, @LemonNekoGH, kindly review and approve this singing validation run when you are available. Thank you.

  validate:
    # NOTICE: Keep the `Singing Review` environment secretless. This job validates
    # untrusted pull request code after an explicit maintainer approval gate.
    if: ${{ github.event_name != 'pull_request_target' || !github.event.pull_request.draft }}
    name: Run singing review validation
    needs:
      - request-approval
    runs-on: ubuntu-latest
    timeout-minutes: 60
    environment: Singing Review
    permissions:
      contents: read

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          repository: ${{ github.event_name == 'pull_request_target' && github.event.pull_request.head.repo.full_name || github.repository }}
          ref: ${{ github.event_name == 'pull_request_target' && github.event.pull_request.head.sha || github.sha }}
          fetch-depth: 1
          persist-credentials: false

      - name: Setup pnpm
        uses: pnpm/action-setup@v5

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: lts/*
          cache: pnpm

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Setup uv
        uses: astral-sh/setup-uv@v6

      - name: Install FFmpeg
        run: |
          sudo apt-get update
          sudo apt-get install -y ffmpeg

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Run singing validation suite
        run: |
          pnpm -F @proj-airi/singing build
          pnpm -F @proj-airi/singing test
          pnpm -F @proj-airi/server typecheck
          pnpm -F @proj-airi/stage-tamagotchi typecheck
          pnpm -F @proj-airi/stage-ui typecheck
          pnpm exec vitest run packages/stage-ui/src/composables/use-singing-cover-runtime.test.ts packages/stage-ui/src/composables/use-singing-training-runtime.test.ts
          pnpm -F @proj-airi/server exec vitest run test/singing-service.test.ts test/singing-routes.test.ts test/request-body-limit.test.ts
          cd packages/singing/python
          uv sync --extra dev --frozen
          uv run pytest -q
          cd ../..
          pnpm -F @proj-airi/singing validate

  report:
    if: ${{ always() && (github.event_name != 'pull_request_target' || !github.event.pull_request.draft) }}
    name: Report singing review result
    needs:
      - request-approval
      - validate
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write

    steps:
      - name: Find Comment
        if: ${{ github.event_name == 'pull_request_target' }}
        uses: peter-evans/find-comment@v4
        id: fc
        with:
          issue-number: ${{ github.event.pull_request.number }}
          comment-author: 'github-actions[bot]'
          body-includes: for the singing module review workflow

      - name: Comment on validation success
        if: ${{ github.event_name == 'pull_request_target' && needs.validate.result == 'success' }}
        uses: peter-evans/create-or-update-comment@v5
        with:
          comment-id: ${{ steps.fc.outputs.comment-id }}
          issue-number: ${{ github.event.pull_request.number }}
          edit-mode: replace
          body: |
            ## Singing module review workflow passed.

            | Name | Link |
            |:-----|:-----|
            | Latest validation log | https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }} |

            The gated singing validation suite completed successfully and the branch is ready for maintainer review.

      - name: Comment on validation failure
        if: ${{ github.event_name == 'pull_request_target' && contains(fromJSON('["failure","cancelled","timed_out"]'), needs.validate.result) }}
        uses: peter-evans/create-or-update-comment@v5
        with:
          comment-id: ${{ steps.fc.outputs.comment-id }}
          issue-number: ${{ github.event.pull_request.number }}
          edit-mode: replace
          body: |
            ## Singing module review workflow failed.

            | Name | Link |
            |:-----|:-----|
            | Latest validation log | https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }} |

            The gated singing validation suite did not complete successfully. Please inspect the linked workflow log before requesting approval again.

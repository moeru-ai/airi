name: Singing Review Validate

on:
  workflow_run:
    workflows:
      - Singing Review Prepare
    types:
      - completed

jobs:
  ask-for-approval:
    if: ${{ github.event.workflow_run.conclusion == 'success' }}
    name: Ask for approval to run singing review validation
    runs-on: ubuntu-latest
    permissions:
      pull-requests: write
      contents: read

    steps:
      - name: Download artifact - metadata
        uses: dawidd6/action-download-artifact@v19
        with:
          workflow_conclusion: success
          run_id: ${{ github.event.workflow_run.id }}
          name: singing-review-meta
          path: singing-review-meta
          allow_forks: true

      - name: Parse metadata
        id: meta
        run: |
          source singing-review-meta/singing_review_meta
          echo "PR_NUM=$PR_NUM" >> "$GITHUB_OUTPUT"
          echo "REPO_FULL_NAME=$REPO_FULL_NAME" >> "$GITHUB_OUTPUT"
          echo "HEAD_REF=$HEAD_REF" >> "$GITHUB_OUTPUT"
          echo "HEAD_SHA=$HEAD_SHA" >> "$GITHUB_OUTPUT"

      - name: Find Comment
        if: ${{ always() }}
        uses: peter-evans/find-comment@v4
        id: fc
        with:
          issue-number: ${{ steps.meta.outputs.PR_NUM }}
          comment-author: 'github-actions[bot]'
          body-includes: for the singing module review workflow

      - name: Comment on require approval
        uses: peter-evans/create-or-update-comment@v5
        with:
          comment-id: ${{ steps.fc.outputs.comment-id }}
          issue-number: ${{ steps.meta.outputs.PR_NUM }}
          edit-mode: replace
          body: |
            ## Approval required for the singing module review workflow.

            | Name | Link |
            |:-----|:-----|
            | Waiting for approval | For maintainers, approve [here](https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}) |

            Hey, @nekomeowww, @sumimakito, @luoling8192, @LemonNekoGH, kindly review and approve this singing validation run when you are available. Thank you.

  validate:
    if: ${{ github.event.workflow_run.conclusion == 'success' }}
    name: Run singing review validation
    runs-on: ubuntu-latest
    timeout-minutes: 60
    environment: Singing Review
    permissions:
      contents: read
      pull-requests: write

    steps:
      - name: Download artifact - metadata
        uses: dawidd6/action-download-artifact@v19
        with:
          workflow_conclusion: success
          run_id: ${{ github.event.workflow_run.id }}
          name: singing-review-meta
          path: singing-review-meta
          allow_forks: true

      - name: Parse metadata
        id: meta
        run: |
          source singing-review-meta/singing_review_meta
          echo "PR_NUM=$PR_NUM" >> "$GITHUB_OUTPUT"
          echo "REPO_FULL_NAME=$REPO_FULL_NAME" >> "$GITHUB_OUTPUT"
          echo "HEAD_REF=$HEAD_REF" >> "$GITHUB_OUTPUT"
          echo "HEAD_SHA=$HEAD_SHA" >> "$GITHUB_OUTPUT"

      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          repository: ${{ steps.meta.outputs.REPO_FULL_NAME }}
          ref: ${{ steps.meta.outputs.HEAD_SHA }}
          fetch-depth: 1
          persist-credentials: false

      - name: Setup pnpm
        uses: pnpm/action-setup@v5

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: lts/*
          cache: pnpm

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Setup uv
        uses: astral-sh/setup-uv@v6

      - name: Install FFmpeg
        run: |
          sudo apt-get update
          sudo apt-get install -y ffmpeg

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Run singing validation suite
        id: validate
        run: |
          pnpm -F @proj-airi/singing build
          pnpm -F @proj-airi/singing test
          pnpm -F @proj-airi/server typecheck
          pnpm -F @proj-airi/stage-tamagotchi typecheck
          pnpm -F @proj-airi/stage-ui typecheck
          pnpm exec vitest run packages/stage-ui/src/composables/use-singing-cover-runtime.test.ts packages/stage-ui/src/composables/use-singing-training-runtime.test.ts
          pnpm -F @proj-airi/server exec vitest run test/singing-service.test.ts test/singing-routes.test.ts test/request-body-limit.test.ts
          cd packages/singing/python
          uv sync --extra dev --frozen
          uv run pytest -q
          cd ../..
          pnpm -F @proj-airi/singing validate

      - name: Find Comment
        if: ${{ always() }}
        uses: peter-evans/find-comment@v4
        id: fc
        with:
          issue-number: ${{ steps.meta.outputs.PR_NUM }}
          comment-author: 'github-actions[bot]'
          body-includes: for the singing module review workflow

      - name: Comment on validation success
        if: ${{ success() }}
        uses: peter-evans/create-or-update-comment@v5
        with:
          comment-id: ${{ steps.fc.outputs.comment-id }}
          issue-number: ${{ steps.meta.outputs.PR_NUM }}
          edit-mode: replace
          body: |
            ## Singing module review workflow passed.

            | Name | Link |
            |:-----|:-----|
            | Latest validation log | https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }} |

            The gated singing validation suite completed successfully and the branch is ready for maintainer review.

      - name: Comment on validation failure
        if: ${{ failure() }}
        uses: peter-evans/create-or-update-comment@v5
        with:
          comment-id: ${{ steps.fc.outputs.comment-id }}
          issue-number: ${{ steps.meta.outputs.PR_NUM }}
          edit-mode: replace
          body: |
            ## Singing module review workflow failed.

            | Name | Link |
            |:-----|:-----|
            | Latest validation log | https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }} |

            The gated singing validation suite reported a failure. Please inspect the linked workflow log before requesting approval again.

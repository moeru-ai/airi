name: Steam Deploy Tamagotchi

permissions:
  actions: read
  contents: read

env:
  STEAM_APP_ID: '3885340'
  STEAM_DEBUG_BRANCH: 'false'
  STEAM_WINDOWS_DEPOT_ID: '3885342'

on:
  workflow_dispatch:
    inputs:
      release_branch:
        description: Steam branch to set live after upload
        required: true
        default: internal-test
        type: string
      build_description:
        description: Optional Steam build description
        required: false
        type: string

jobs:
  build-steam-content:
    name: Build Steam content
    permissions:
      actions: read
      contents: write
    uses: ./.github/workflows/release-tamagotchi.yml
    with:
      build_only: true
      distribution: steam
      platform: all
    secrets: inherit

  deploy-steam:
    name: Upload to Steam
    runs-on: ubuntu-latest
    needs:
      - build-steam-content
    steps:
      - name: Resolve build metadata
        id: metadata
        uses: actions/github-script@v9
        env:
          INPUT_BUILD_DESCRIPTION: ${{ inputs.build_description }}
        with:
          result-encoding: string
          script: |
            const fallback = `AIRI desktop Steam artifacts from workflow run ${process.env.GITHUB_RUN_ID}`
            const description = (process.env.INPUT_BUILD_DESCRIPTION || fallback)
              .replace(/[\r\n\t]+/g, ' ')
              .replace(/[\u0000-\u001f\u007f]+/g, ' ')
              .replaceAll('\\', '/')
              .replaceAll('"', "'")
              .replace(/ {2,}/g, ' ')
              .trim()
              .slice(0, 512)

            return description || fallback

      - name: Download Steam content
        uses: actions/download-artifact@v5
        with:
          pattern: steam-content-*
          path: steam-artifacts
          merge-multiple: true

      - name: Prepare Steam upload root
        run: |
          mkdir -p steam-build
          archive_count=0

          while IFS= read -r archive; do
            archive_count=$((archive_count + 1))
            tar -xf "$archive" -C steam-build
          done < <(find steam-artifacts -type f -name '*.tar' | sort)

          if [ "$archive_count" -ne 3 ]; then
            echo "Expected 3 Steam content archives, found $archive_count."
            find steam-artifacts -maxdepth 3 -type f -print
            exit 1
          fi

          test -f steam-build/windows/airi.exe
          test -x steam-build/macos/AIRI.app/Contents/MacOS/airi
          test -x steam-build/linux/airi

          if find steam-build/macos/AIRI.app -name '*.pdb' -print -quit | grep -q .; then
            echo "Refusing to upload macOS content containing .pdb files."
            exit 1
          fi

          if find steam-build/macos/AIRI.app -name '._*' -print -quit | grep -q .; then
            echo "Refusing to upload macOS content containing AppleDouble files."
            exit 1
          fi

          if ! file steam-build/macos/AIRI.app/Contents/MacOS/airi | grep -q 'arm64'; then
            echo "Steam macOS content currently supports Apple Silicon only."
            file steam-build/macos/AIRI.app/Contents/MacOS/airi
            exit 1
          fi

          find steam-build -maxdepth 2 -type d -print

      - name: Deploy desktop builds to Steam
        uses: game-ci/steam-deploy@v3.2.0
        with:
          username: ${{ secrets.STEAM_USERNAME }}
          configVdf: ${{ secrets.STEAM_CONFIG_VDF }}
          appId: ${{ env.STEAM_APP_ID }}
          firstDepotIdOverride: ${{ env.STEAM_WINDOWS_DEPOT_ID }}
          buildDescription: ${{ steps.metadata.outputs.result }}
          rootPath: steam-build
          depot1Path: windows
          depot2Path: macos
          depot3Path: linux
          releaseBranch: ${{ inputs.release_branch }}
          debugBranch: ${{ env.STEAM_DEBUG_BRANCH }}
